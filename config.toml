baseURL = "http://vjeantet.fr/"
languageCode = "fr-FR"
defaultContentLanguage = "fr"
title = "Valère JEANTET"
theme = "archie"
copyright = "All rights reserved"
pygmentsstyle = "monokai"
pygmentsCodeFences = true
pygmentscodefencesguesssyntax = true
pygmentsUseClasses = true
pluralizelisttitles = false

[pagination]
pagerSize = 10

[outputs]
home = ["HTML", "RSS"]

[params]
mode = "auto"
useCDN = false
author = "Valère JEANTET"
subtitle = "IT software and Security Engineer, Open source enthusiast."
description = "IT software and Security Engineer, Open source enthusiast."
keywords = "blog, security, golang, hugo, devops"
favicon = "/images/logo.png"
mainSections = ["post"]
defer_custom_js = ["/js/netlify-identity.js"]

[[params.social]]
name = "GitHub"
icon = "github"
url = "https://github.com/vjeantet"

[[params.social]]
name = "Twitter"
icon = "twitter"
url = "https://twitter.com/vjeantet"

[[params.social]]
name = "Mastodon"
icon = "simple:mastodon"
url = "https://hachyderm.io/@vjeantet"

[[params.social]]
name = "Keybase (secure msg)"
icon = "simple:keybase"
url = "https://keybase.io/vjeantet"

[[menu.main]]
name = "Home"
url = "/"
weight = 1

[[menu.main]]
name = "Posts"
url = "/post/"
weight = 2

[[menu.main]]
name = "Security"
url = "/security/"
weight = 3

[[menu.main]]
name = "About"
url = "/about/"
weight = 4

[[menu.main]]
name = "Tags"
url = "/tags/"
weight = 5

[frontmatter]
lastmod = ["lastmod", ":fileModTime", ":default"]

[taxonomies]
tag = "tags"

[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true

[permalinks]
post = "/:slug/"

[sitemap]
ChangeFreq = ""
Filename = "sitemap.xml"
Priority = "-1"
